

services:
  # 這是我們的資料庫服務，命名為 db
  db:
    image: mysql:8.0
    container_name: accounting_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: accounting_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: